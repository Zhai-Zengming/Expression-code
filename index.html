<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>杨敏</title>
    <style>
      #videofilm {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
      }
      .confession-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 10;
        width: 75%; /* 减小宽度，让它不要填满手机屏幕左右边缘 */
        max-width: 320px;
        background: rgba(0, 0, 0, 0.05); /* 背景透明度再次降低，几乎完全通透 */
        padding: 20px 20px 25px 20px; /* 减小上下左右的内边距，使框的长宽更紧凑协调 */
        border-radius: 15px;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.05); /* 阴影也相应减弱 */
        -webkit-backdrop-filter: blur(1px); /* 兼容 Safari 模糊感 */
        backdrop-filter: blur(1px); /* 进一步降低毛玻璃模糊感 */
      }
      .confession-container h1 {
        font-size: 24px; /* 字号稍微改小一点点适应更精巧的框 */
        color: #ffb6c1; /* 浅粉色比较温馨浪漫 */
        font-family: 'LXGW WenKai Lite', '楷体', 'KaiTi', 'STKaiti', cursive;
        line-height: 1.6;
        margin-bottom: 25px;
        text-shadow: 0 0 10px rgba(255, 182, 193, 0.8);
      }
      .buttons {
        display: flex;
        justify-content: space-around;
        gap: 20px;
      }
      .buttons button {
        padding: 12px 30px;
        font-size: 18px;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.3s ease;
      }
      #btn-agree {
        background: #ff69b4;
        color: white;
        box-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
      }
      #btn-agree:active {
        transform: scale(0.95);
      }
      #btn-disagree {
        background: #888;
        color: #ccc;
        cursor: not-allowed;
        /* 或者如果想做成悬浮跑掉的按钮，可以用JS实现，但目前要求是点不动 */
      }
      @keyframes pulse {
        0% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 105, 180, 0.4); }
        50% { transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 105, 180, 0.8); }
        100% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 105, 180, 0.4); }
      }
    </style>
    <!-- 引入免费的开源云端楷体字体：霞鹜文楷，专门适配手机端不支持楷体的问题 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-lite-webfont@1.1.0/style.css" />
    <link rel="stylesheet" href="css/skystar.css">
  </head>
  <body>
    <!-- 背景视频保持静音循环播放。加上 playsinline 保证 iOS 上不全屏并允许内联播放 -->
    <video id="videofilm" muted loop playsinline webkit-playsinline x5-playsinline preload="auto">
      <source src="video/skystar.mp4" type="video/mp4">
    </video>
    
    <!-- 添加背景音乐：必须用 preload="auto"，否则微信点击再拉取会因为超时失去播放权限 -->
    <audio id="bgm" src="video/KEY.L刘聪、$CC731 - MY BOO.mp3" loop preload="auto"></audio>

    <!-- 第一页：入口层 -->
    <div id="start-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; background: #000; display: flex; justify-content: center; align-items: center; flex-direction: column;">
      <div style="position: absolute; top: 15px; left: 15px; color: rgba(255,255,255,0.4); font-size: 12px; font-family: sans-serif;">测试版本: V1.5 (iOS兼容)</div>
      <h1 style="color: #ffb6c1; margin-bottom: 40px; font-family: 'LXGW WenKai Lite', '楷体', cursive; font-size: 24px;">收到一封给你的专属信件</h1>
      <button onclick="startJourney()" style="padding: 15px 40px; font-size: 20px; border: none; border-radius: 30px; background: #ff69b4; color: white; cursor: pointer; box-shadow: 0 0 20px rgba(255, 105, 180, 0.6); animation: pulse 2s infinite; font-family: 'LXGW WenKai Lite', '楷体', cursive;">点击开启</button>
    </div>

    <!-- 表白层（初始隐藏） -->
    <div class="confession-container" id="confession-ui" style="display: none;">
      <h1>杨敏 我喜欢你<br>你愿意做我女朋友吗</h1>
      <div class="buttons">
        <button id="btn-agree" onclick="goToNextPage()">同意</button>
        <button id="btn-disagree" onclick="showCustomAlert()">不同意</button>
      </div>
    </div>
    
    <!-- 自定义拒绝提示框：替代原始的 alert() 避免浏览器拦截或询问关闭 -->
    <div id="custom-alert" style="display: none; position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: rgba(255, 105, 180, 0.9); color: white; padding: 15px 25px; border-radius: 30px; z-index: 100000; font-family: 'LXGW WenKai Lite', '楷体', cursive; font-size: 16px; box-shadow: 0 4px 15px rgba(255,105,180,0.4); text-align: center; white-space: nowrap; opacity: 0; transition: opacity 0.3s ease;">不行哦，再好好想一想嘛~ (๑•́ ₃ •̀๑)</div>

    <!-- 内嵌页面容器，预留淡入动画 -->
    <iframe id="next-page-frame" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 9999; background: #000; opacity: 0; transition: opacity 1.5s ease;"></iframe>

    <div class="container"></div>
    <script src="js/skystar.js"></script>
    <script>
      let alertTimer = null;
      function showCustomAlert() {
        var alertBox = document.getElementById('custom-alert');
        alertBox.style.display = 'block';
        // 触发重绘以保证过渡动画生效
        alertBox.offsetHeight; 
        alertBox.style.opacity = '1';
        
        if(alertTimer) clearTimeout(alertTimer);
        alertTimer = setTimeout(function() {
          alertBox.style.opacity = '0';
          setTimeout(function() {
            alertBox.style.display = 'none';
          }, 300); // 等待透明度过渡结束
        }, 2000); // 弹窗显示2秒
      }

      function startJourney() {
        var startBtn = document.querySelector('#start-overlay button');
        if(startBtn) {
            startBtn.innerText = '加载中...';
            startBtn.style.animation = 'none';
        }
        
        var bgm = document.getElementById('bgm');
        var video = document.getElementById('videofilm');
        
        // 兼容各类老旧浏览器及微信/QQ内置浏览器：
        // 有些浏览器 .play() 不返回 Promise，或者返回的 Promise 会无限挂起，导致 Promise.all 永远不执行
        try {
            var p1 = bgm.play();
            if (p1 && p1.catch) {
                p1.catch(e => console.log('BGM play failed:', e));
            }
        } catch(e) { console.log('BGM err:', e); }

        try {
            var p2 = video.play();
            if (p2 && p2.catch) {
                p2.catch(e => console.log('Video play failed:', e));
            }
        } catch(e) { console.log('Video err:', e); }
        
        // 不再死等音视频对象的异步回调（防止微信 webview 挂死）
        // 给予短暂的 400ms 缓冲后直接强制显示表白界面，保证流程绝对畅通
        setTimeout(function() {
          var overlay = document.getElementById('start-overlay');
          var ui = document.getElementById('confession-ui');
          if (overlay) overlay.style.display = 'none';
          if (ui) ui.style.display = 'block';
        }, 400);
      }

      function goToNextPage() {
        // 先隐藏表白界面，让用户看到界面有实时反馈
        document.getElementById('confession-ui').style.display = 'none';
        
        var frame = document.getElementById('next-page-frame');
        // 显示iframe让它开始占据位置并加载
        frame.style.display = 'block';
        frame.src = '011/index.html';
        
        // 监听 iframe 加载完毕后再执行淡入过度，完美解决卡顿与黑屏闪烁问题
        frame.onload = function() {
          frame.style.opacity = '1';
        };
      }

      // 【终极微信/iOS 兼容杀手锏】
      // 1. 利用微信内置 JSBridge，在环境就绪时提前取得底层的多媒体操作特权
      document.addEventListener("WeixinJSBridgeReady", function () {
        document.getElementById('bgm').load();
        document.getElementById('videofilm').load();
      }, false);

      // 2. 增加全局触摸预热：只要用户指尖碰到屏幕（比如准备点按钮时），立即在底层激活音视频上下文，拿取播放硬核权限
      document.addEventListener("touchstart", function() {
        var preBgm = document.getElementById('bgm');
        var preVid = document.getElementById('videofilm');
        
        // 瞬间触发然后马上暂停，此举相当于在这个短暂的手势生命周期中合法获取了"该页面的音频任意播放权"
        try { if(preBgm.paused) preBgm.load(); } catch(e){}
        try { if(preVid.paused) preVid.load(); } catch(e){}
      }, { once: true });
    </script>
    
  </body>
</html>
