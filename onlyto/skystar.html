<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>今晚，整片星空将为你一人闪烁</title>
    <style>
      #videofilm {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
      }
      .confession-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 10;
        width: 90%;
        max-width: 400px;
        background: rgba(0, 0, 0, 0.4);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(5px);
      }
      .confession-container h1 {
        font-size: 28px;
        color: #ffb6c1; /* 浅粉色比较温馨浪漫 */
        font-family: '楷体', 'KaiTi', 'STKaiti', cursive;
        line-height: 1.6;
        margin-bottom: 30px;
        text-shadow: 0 0 10px rgba(255, 182, 193, 0.8);
      }
      .buttons {
        display: flex;
        justify-content: space-around;
        gap: 20px;
      }
      .buttons button {
        padding: 12px 30px;
        font-size: 18px;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.3s ease;
      }
      #btn-agree {
        background: #ff69b4;
        color: white;
        box-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
      }
      #btn-agree:active {
        transform: scale(0.95);
      }
      #btn-disagree {
        background: #888;
        color: #ccc;
        cursor: not-allowed;
        /* 或者如果想做成悬浮跑掉的按钮，可以用JS实现，但目前要求是点不动 */
      }
    </style>
    <link rel="stylesheet" href="css/skystar.css">
  </head>
  <body>
    <!-- 背景视频保持静音循环播放 -->
    <video id="videofilm" poster="img/skystar2.jpg" autoplay muted loop playsinline="true" webkit-playsinline="true" x5-playsinline="true">
      <source src="video/skystar.mp4" type="video/mp4">
    </video>
    
    <!-- 添加背景音乐 -->
    <audio id="bgm" src="video/KEY.L刘聪、$CC731 - MY BOO.mp3" autoplay loop></audio>

    <div class="confession-container">
      <h1>杨敏 我喜欢你<br>你愿意做我女朋友吗</h1>
      <div class="buttons">
        <button id="btn-agree" onclick="goToNextPage()">同意</button>
        <button id="btn-disagree" onclick="alert('不行哦，再好好想一想嘛~ (๑•́ ₃ •̀๑)')">不同意</button>
      </div>
    </div>
    
    <!-- 内嵌页面容器，用于保障无缝切换播放音乐 -->
    <iframe id="next-page-frame" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 9999; background: #000;"></iframe>

    <div class="container"></div>
    <script src="js/skystar.js"></script>
    <script>
      function goToNextPage() {
        // 使用iframe加载下一页内容，从而不打断当前页面的背景音乐播放
        var frame = document.getElementById('next-page-frame');
        frame.src = '011/index.html';
        frame.style.display = 'block';
      }

      // 解决浏览器禁止自动播放声音的问题：只要用户在页面随意点击或触碰一下屏幕，音乐就会开始播放
      document.body.addEventListener('click', function() {
        var bgm = document.getElementById('bgm');
        if (bgm.paused) {
          bgm.play();
        }
      }, { once: true });
      document.body.addEventListener('touchstart', function() {
        var bgm = document.getElementById('bgm');
        if (bgm.paused) {
          bgm.play();
        }
      }, { once: true });
    </script>
    
  </body>
</html>
